name: paper_figures
runs_root: runs
output_dir: figures/paper/latest
format: jpeg
show: false
min_seeds_for_claims: 5
ci_method: bootstrap
ci_level: 0.95
bootstrap_samples: 2000
bootstrap_seed: 123
rollouts_per_seed: 100
include_goal_types: [fixed_goal, random_goal]
max_steps: 750
reward_function: step_minus_weighted_euclidean
clear_output_dir: true
